name: migrations_alembic
dependencies:
  - alembic
files:
  - source: alembic.ini.j2
    destination: alembic.ini
  - source: alembic/env.py.j2
    destination: alembic/env.py
make_targets:
  migrate: "$(VENV_PYTHON) -m alembic upgrade head"
  revision: "$(VENV_PYTHON) -m alembic revision --autogenerate -m \"change\""
requires:
  - orm_sqlalchemy
